<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Shadow — offline</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: #18181b;
      color: #e4e4e7;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }
    .card { max-width: 420px; }
    .logo {
      width: 56px; height: 56px; border-radius: 16px;
      background: #27272a; margin: 0 auto 20px;
      display: flex; align-items: center; justify-content: center;
      font-size: 28px;
    }
    h1 { font-size: 20px; font-weight: 650; margin: 0 0 8px; }
    p { font-size: 15px; line-height: 1.5; color: #a1a1aa; margin: 0 0 24px; }
    button {
      appearance: none; border: 0; cursor: pointer;
      background: #6366f1; color: #fff;
      font-size: 15px; font-weight: 600;
      padding: 12px 24px; border-radius: 12px;
      width: 100%;
    }
    button:active { background: #4f46e5; }
  </style>
</head>
<body>
  <main class="card">
    <div class="logo" aria-hidden="true">🌑</div>
    <h1>Shadow è offline</h1>
    <p>Non riesco a raggiungere il server in questo momento. Controlla la connessione e riprova.</p>
    <button onclick="location.reload()">Riprova</button>
  </main>
</body>
</html>
